services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/workplace_safety_platform?schema=public
      - NODE_ENV=production
      - JWT_SECRET=change-this-in-production-12345
      - AI_OLLAMA_ENDPOINT=http://ollama-service:11434
      - APP_ORIGIN=http://192.168.6.213:3000
      - SEED_DATABASE=true
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workplace_safety_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workplace_safety_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama-service:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: always

volumes:
  postgres_data:
  ollama-models:
